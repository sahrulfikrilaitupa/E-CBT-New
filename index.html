<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Ujian Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <audio id="alert-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Masuk Ujian</h2>
                <p class="text-slate-500 mt-1">Sistem akan menyesuaikan ujian sesuai waktu saat ini.</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nama Lengkap</label>
                    <input type="text" id="input-nama" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Masukkan nama...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Kelas</label>
                    <input type="text" id="input-kelas" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Contoh: VII-1">
                </div>
                <button onclick="mulaiUjian()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg">
                    Mulai Kerjakan
                </button>
            </div>
        </div>
    </div>

    <div id="main-exam-content" class="hidden">
        <div class="max-w-6xl mx-auto p-4 md:p-8">
            <header class="bg-white shadow-sm rounded-xl p-4 mb-6 border border-slate-200 flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold text-slate-800">Ujian Online Aktif</h1>
                    <p class="text-sm text-slate-500">Siswa: <span id="display-nama" class="font-semibold"></span> | Kelas: <span id="display-kelas" class="font-semibold"></span></p>
                </div>
            </header>
            <main class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden" style="height: 80vh;">
                <iframe id="exam-iframe" width="100%" height="100%" frameborder="0">Memuat...</iframe>
            </main>
        </div>
    </div>

    <div id="warning-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden z-[200] items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-bold text-red-600">Terdeteksi Curang!</h3>
            <p class="text-slate-600 mt-2 mb-6">Anda terdeteksi meninggalkan halaman.</p>
            <button onclick="closeModal()" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl shadow-lg">Kembali & Refresh</button>
        </div>
    </div>

    <script>
        function getExamConfig() {
            const now = new Date();
            const day = now.getDay();
            const jam = now.getHours();

            const jadwal = {
                4: { sesi1: { start: 5, end: 8, form: "https://docs.google.com/forms/d/e/1FAIpQLSfVeFn-z6OhZyJKB4UB_dgHC96hYWC3RspOyEQSNATth33z6g/viewform?usp=header", log: "https://script.google.com/macros/s/AKfycbz-_GBOnv8Dz580uap7nQzpfkalUFe6hQmBqfCP4ySgVmU1LiTot569HP6vqNQhQklCMQ/exec" }, sesi2: { start: 8.5, end: 13, form: "https://docs.google.com/forms/d/e/1FAIpQLSfzGXN7-viLlPH3swc1951PCLcwoG2oJOlUSbSUzMVfghC1Pw/viewform?usp=header", log: "https://script.google.com/macros/s/AKfycbz-_GBOnv8Dz580uap7nQzpfkalUFe6hQmBqfCP4ySgVmU1LiTot569HP6vqNQhQklCMQ/exec" } },
                5: { sesi1: { start: 5, end: 10, form: "URL_SELASA_SESI_1", log: "LOG_SELASA_1" }, sesi2: { start: 8.5, end: 13, form: "URL_SELASA_SESI_2", log: "LOG_SELASA_2" } }
            };

            const hariIni = jadwal[day];
            if (hariIni) {
                if (jam >= hariIni.sesi1.start && jam < hariIni.sesi1.end) return { formUrl: hariIni.sesi1.form, logUrl: hariIni.sesi1.log };
                if (jam >= hariIni.sesi2.start && jam < hariIni.sesi2.end) return { formUrl: hariIni.sesi2.form, logUrl: hariIni.sesi2.log };
            }

            return {
                formUrl: "https://docs.google.com/forms/d/e/1FAIpQLSfVeFn-z6OhZyJKB4UB_dgHC96hYWC3RspOyEQSNATth33z6g/viewform?usp=header",
                logUrl: "https://script.google.com/macros/s/AKfycbz-_GBOnv8Dz580uap7nQzpfkalUFe6hQmBqfCP4ySgVmU1LiTot569HP6vqNQhQklCMQ/exec"
            };
        }

        let studentData = { nama: "", kelas: "" };

        window.onload = () => {
            const savedNama = sessionStorage.getItem("student_nama");
            const savedKelas = sessionStorage.getItem("student_kelas");
            if (savedNama && savedKelas) {
                studentData.nama = savedNama;
                studentData.kelas = savedKelas;
                masukHalamanUjian();
            }
        };

        function mulaiUjian() {
            const nama = document.getElementById('input-nama').value;
            const kelas = document.getElementById('input-kelas').value;
            if (nama.trim() === "" || kelas.trim() === "") {
                alert("Mohon isi Nama dan Kelas!");
                return;
            }
            studentData.nama = nama;
            studentData.kelas = kelas;
            sessionStorage.setItem("student_nama", nama);
            sessionStorage.setItem("student_kelas", kelas);
            masukHalamanUjian();
        }

        function masukHalamanUjian() {
            const config = getExamConfig();
            document.getElementById('exam-iframe').src = config.formUrl;
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('main-exam-content').classList.remove('hidden');
            document.getElementById('display-nama').innerText = studentData.nama;
            document.getElementById('display-kelas').innerText = studentData.kelas;
        }

        function logToSpreadsheet() {
            const config = getExamConfig();
            const payload = {
                username: studentData.nama,
                userClass: studentData.kelas, // Data kelas ditambahkan di sini
                message: "Meninggalkan tab",
                timestamp: new Date().toLocaleString("id-ID")
            };

            fetch(config.logUrl, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(err => console.error(err));
        }

        function showWarning() {
            if (document.getElementById('main-exam-content').classList.contains('hidden')) return;
            document.getElementById('warning-modal').classList.remove('hidden');
            document.getElementById('warning-modal').classList.add('flex');
            document.getElementById('alert-sound').play().catch(e => {});
            logToSpreadsheet();
        }

        function closeModal() { window.location.reload(); }

        document.addEventListener("visibilitychange", () => { if (document.hidden) showWarning(); });
    </script>
</body>
</html>
